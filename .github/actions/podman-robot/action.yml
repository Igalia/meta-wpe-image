inputs:
  machine:
    default: 'raspberrypi5'
  target:
    default: 'core-image-weston-wpe'
  github_token:
    required: true
  s3_storage:
    required: true
  wpe_version:
    required: true
runs:
  using: 'composite'
  steps:
    - name: Print environment
      shell: bash
      run:  |
        echo "Environment:"
        echo "======================================================================"
        echo "MACHINE=${{ inputs.machine }}"
        echo "S3_STORAGE=${{ inputs.s3_storage }}"
        echo "TARGET=${{ inputs.target }}"
        echo "WPE_VERSION=${{ inputs.wpe_version }}"
        echo "======================================================================"
    - name: Download timestamp artifact
      uses: actions/download-artifact@v7
      with:
        pattern: timestamp.txt
        merge-multiple: true
    - name: Get timestamped prefix
      id: timestamp
      shell: bash
      run: |
        TIMESTAMP=$(cat timestamp.txt)
        echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
    - name: Prepare the Robot-Framework related PODs in background
      shell: bash
      run:  |
        git lfs pull
        pushd .ci
        podman rm ci_webserver_1 ci_robot_1 -f
        ./podman-compose.sh up --force-recreate --always-recreate-deps --build -d
        popd
    - name: Install dut-control
      shell: bash
      run: |
        python3 -m venv venv
        source venv/bin/activate
        rm -rf dut-control
        git clone https://github.com/psaavedra/dut-control.git
        pushd dut-control || exit
        git checkout add-reserve-retries
        pip install --upgrade pip && pip install .
        popd || exit
        echo "${GITHUB_WORKSPACE}/venv/bin" >> $GITHUB_PATH
    - name: Reserve DUT
      shell: bash
      run: |
        MACHINE=${{ inputs.machine }}

        # Execute the command and capture both stdout and stderr
        OUTPUT=$(dut-control-client reserve --retries 50 "$MACHINE" 2>&1)

        # Check if the output contains the successful "token:" keyword
        if echo "$OUTPUT" | grep -q "^token:"; then
            # Parse the output to extract the variables
            DUT_TOKEN=$(echo "$OUTPUT" | awk '/^token:/ {print $2}')
            DUT_IP=$(echo "$OUTPUT" | awk '/^ip:/ {print $2}')
            DUT_SSH_PORT=$(echo "$OUTPUT" | awk '/^ssh-port:/ {print $2}')

            echo "Reservation successful!"
            echo "DUT_IP=$DUT_IP"
            echo "DUT_SSH_PORT=$DUT_SSH_PORT"

            # Mask token before exporting to avoid leaking it in logs
            echo "::add-mask::${DUT_TOKEN}"

            # Export variables so they are available to subsequent steps
            echo "DUT_IP=${DUT_IP}" >> $GITHUB_ENV
            echo "DUT_TOKEN=${DUT_TOKEN}" >> $GITHUB_ENV
            echo "DUT_SSH_PORT=${DUT_SSH_PORT}" >> $GITHUB_ENV
        else
            # Handle unexpected errors (e.g., status=-1 or network failure)
            echo "$OUTPUT"
            echo "::error::Failed with an unexpected error"
            exit 1
        fi
    - name: Flash
      shell: bash
      run:  |
        # TIMESTAMP=202606140430
        [ -n "${DUT_TOKEN}" ] || { echo "::error::DUT_TOKEN is not set"; exit 1; }
        dut-control-client power off "$DUT_TOKEN"
        # s3cmd get -F s3://${{ inputs.s3_storage }}/${TIMESTAMP}-wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}/${{ inputs.target }}-${{ inputs.machine }}.wic.bmap
        # s3cmd get -F s3://${{ inputs.s3_storage }}/${TIMESTAMP}-wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}/${{ inputs.target }}-${{ inputs.machine }}.wic.bz2
        # dut-control-client --timeout 300 flash "$DUT_TOKEN" "$(pwd)/${{ inputs.target }}-${{ inputs.machine }}.wic.bz2"
        dut-control-client power on "$DUT_TOKEN"
        MAX_RETRIES=10
        WAIT_TIME=30
        echo "Waiting for DUT ($DUT_TOKEN) to become online..."
        for (( i=1; i<=MAX_RETRIES; i++ )); do
            # Execute command, redirect stderr to stdout, and trim whitespace using xargs
            STATUS=$(dut-control-client status "$DUT_TOKEN" 2>&1 | xargs)

            if [ "$STATUS" = "ssh" ]; then
                echo "Success: DUT is online!"
                break
            else
                echo "Attempt $i/$MAX_RETRIES: DUT is '$STATUS'. Waiting ${WAIT_TIME} seconds..."

                if [ "$i" -lt "$MAX_RETRIES" ]; then
                    sleep "$WAIT_TIME"
                else
                    fatal "Timed out waiting for DUT to become online after 5 minutes."
                fi
            fi
        done
    - name: Test
      shell: bash
      run:  |
        TIMESTAMP=${{ steps.timestamp.outputs.timestamp }}
        GITHUB_PR_SHA=${GITHUB_SHA}
        if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            GITHUB_PR_SHA=$(cat $GITHUB_EVENT_PATH | jq -r .pull_request.head.sha)
        fi
        cd .ci
        echo "💿️ **Image for [wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}](https://wk-contrib.igalia.com/yocto/meta-wpe-image/${TIMESTAMP}-wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}/) (ref: ${GITHUB_PR_SHA}).**" > ci-message.txt

        [ -n "${DUT_IP}" ] || { echo "::error::DUT_IP is not set"; exit 1; }
        [ -n "${DUT_SSH_PORT}" ] || { echo "::error::DUT_SSH_PORT is not set"; exit 1; }
        WEBSERVER_IP="127.0.0.1"
        echo "#!/bin/sh" > setup-env-local.sh
        echo "export TEST_BOARD_IP=${DUT_IP}" >> setup-env-local.sh
        echo "export TEST_WEBSERVER_IP=${WEBSERVER_IP}" >> setup-env-local.sh
        echo "export TEST_WPEWEBKIT_VERSION=${{ inputs.wpe_version }}" >> setup-env-local.sh
        echo "export TEST_MACHINE=${{ inputs.machine }}" >> setup-env-local.sh

        # Reverse-tunnel the runner's webserver port 8008 to DUT localhost:8008
        # so the DUT browser can reach the webserver via 127.0.0.1:8008
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ExitOnForwardFailure=yes \
            -N -f -R 8008:localhost:8008 \
            -p "${DUT_SSH_PORT}" root@"${DUT_IP}"

        if ./run-tests.sh; then
          MESSAGE="Tests results: https://wk-contrib.igalia.com/yocto/meta-wpe-image/${TIMESTAMP}-wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}/robot/report.html - Tests passed for \`wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}\` on \`${{ inputs.target }}\`."
          echo "::notice file=.ci/run-tests.sh,title=Robot Framework tests::${MESSAGE}"
          echo "* ✅️ ${MESSAGE}" >> ci-message.txt
        else
          MESSAGE="Tests results: https://wk-contrib.igalia.com/yocto/meta-wpe-image/${TIMESTAMP}-wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}/robot/report.html - Failures were detected in the test results for \`wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}\` on \`${{ inputs.target }}\`."
          echo "::warning file=.ci/run-tests.sh,title=Robot Framework tests::${MESSAGE}"
          echo "* ⚠️  ${MESSAGE}" >> ci-message.txt
        fi
        s3cmd put -r -F tests_results/robot s3://${{ inputs.s3_storage }}/${TIMESTAMP}-wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}/
    - name: Comment on the pull request
      uses: mshick/add-pr-comment@v3
      with:
        message-id: wpe-${{ inputs.wpe_version }}-${{ inputs.machine }}-${{ steps.timestamp.outputs.timestamp }}
        message-path: |
            .ci/ci-message.txt
    - name: Stop DUT and Clean the tests directory
      if: always()
      shell: bash
      run:  |
        if [ -n "${DUT_TOKEN}" ]; then
          dut-control-client power off "$DUT_TOKEN"
          dut-control-client lease --all
        fi
        rm -rf .ci/setup-env-local.sh .ci/tests_results .ci/ci-message.txt
